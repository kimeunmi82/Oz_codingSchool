<div class="card">
    <h2>진료 상세 정보</h2>
    <div style="display: flex; gap: 2rem;">
        <div style="flex: 1;">
            <p><strong>ID:</strong> <span id="record-id"></span></p>
            <p><strong>차트 번호:</strong> <span id="chart-number"></span></p>
            <p><strong>증상:</strong> <span id="symptoms-text"></span></p>
            <p><strong>등록일:</strong> <span id="created-at"></span></p>
        </div>
        <div style="flex: 1;">
            <p><strong>X-Ray 이미지:</strong></p>
            <img id="xray-img" src="" alt="X-Ray" style="max-width: 100%; border-radius: 8px;">
        </div>
    </div>

    <hr style="margin: 2rem 0; border: 0; border-top: 1px solid #eee;">
    
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <h3>AI 폐렴 예측 결과</h3>
        <div style="display: flex; gap: 0.5rem;">
            <button id="predict-btn">AI 예측 결과보기</button>
            <button id="refresh-analysis-btn" class="secondary">새로고침</button>
        </div>
    </div>

    <p id="analysis-empty" hidden>저장된 예측 결과가 없습니다.</p>
    <div style="overflow-x: auto;">
        <table id="analysis-table" hidden>
            <thead>
                <tr>
                    <th>고유 ID</th>
                    <th>폐렴 여부</th>
                    <th>Confidence</th>
                    <th>Heatmap Image URL</th>
                    <th>예측 수행 일시</th>
                    <th>사용한 모델</th>
                </tr>
            </thead>
            <tbody id="analysis-list"></tbody>
        </table>
    </div>

    <p class="ai-result-notice">
        Grad-CAM은 AI 모델이 예측 시 주목한 영역을 표시하며,
        실제 병변 위치를 확정하는 의료 진단 결과가 아닙니다.
    </p>
    
    <button id="back-to-patient-btn" class="secondary" style="margin-top: 1rem;">진료 목록으로</button>
</div>
