<div class="card auth-card">
  <h2>로그인</h2>
  <form onsubmit="pages.handleLogin(event)">
    <label for="email">이메일</label>
    <input type="email" id="email" placeholder="이메일" required />

    <label for="password">비밀번호</label>
    <div class="password-input-wrapper">
      <input
        type="password"
        id="password"
        name="password"
        placeholder="비밀번호"
        autocomplete="current-password"
        maxlength="128"
        required
      />

      <button
        type="button"
        class="password-toggle"
        data-password-target="password"
        aria-controls="password"
        aria-label="비밀번호 보기"
        aria-pressed="false"
      >
        보기
      </button>
    </div>

    <div
      id="login-error"
      class="error-message"
      style="
        display: none;
        color: var(--danger-color);
        font-size: 0.85rem;
        margin-top: -0.5rem;
        margin-bottom: 0.5rem;
        font-weight: 500;
      "
    >
      아이디 또는 비밀번호를 확인해주세요.
    </div>

    <button type="submit" style="margin-top: 0.5rem">로그인</button>
  </form>
  <p style="text-align: center; margin-top: 1rem">
    계정이 없으신가요? <a href="/signup" onclick="route(event)">회원가입</a>
  </p>
</div>
